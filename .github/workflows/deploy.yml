name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 22 "$SERVER_USER@$SERVER_HOST" << 'DEPLOY_SCRIPT'
            cd /var/www/webtmdt
            git reset --hard
            git pull origin main
            npm install
            npm run build
            pm2 reload webtmdt || pm2 start ecosystem.config.js
          DEPLOY_SCRIPT
